services:

  fatum-redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - fatum-net

  fatum-database:
    image: postgres:16-alpine
    container_name: fatum_db
    restart: unless-stopped
    env_file:
      - ./.env
    volumes:
      - ${POSTGRES_VOLUME}:/var/lib/postgresql/data
    networks:
      - fatum-net

  fatum-web:
    image: python:3.13-slim
    working_dir: /app
    restart: unless-stopped
    command: >
      sh -c "pip install . gunicorn &&
             python manage.py collectstatic --noinput &&
             python manage.py migrate &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120"
    volumes:
      - ../../:/app
      - fatum-static:/app/staticfiles
      - fatum-media:/app/media
    env_file:
      - ./.env
    depends_on:
      - fatum-database
      - fatum-redis
    networks:
      - fatum-net

  fatum-nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - fatum-static:/staticfiles:ro
      - fatum-media:/media:ro
    depends_on:
      - fatum-web
    networks:
      - fatum-net

  celery-worker:
    image: python:3.13-slim
    working_dir: /app
    restart: unless-stopped
    command: sh -c "pip install . && celery -A config worker -l info"
    volumes:
      - ../../:/app
      - fatum-media:/app/media
    env_file:
      - ./.env
    depends_on:
      - fatum-redis
      - fatum-database
    networks:
      - fatum-net

