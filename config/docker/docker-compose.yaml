services:

  fatum-redis:
    image: redis
    ports:
      - "6379:6379"
    networks:
      - fatum-net

  fatum-database:
    image: postgres:latest
    container_name: fatum_db
    env_file:
      - ./.env
    ports:
      - "5432:5432"

    volumes:
      - ${POSTGRES_VOLUME}:/var/lib/postgresql
    networks:
      - fatum-net

  celery-worker:
    image: python:3.13-slim
    working_dir: /app
    command: sh -c "pip install -r pyproject.toml && celery -A config worker -l info"
    volumes:
      - ../../:/app
    env_file:
      - ./.env
    depends_on:
      - fatum-redis
      - fatum-database
    networks:
      - fatum-net

  celery-beat:
    image: python:3.13-slim
    working_dir: /app
    command: sh -c "pip install -r pyproject.toml && celery -A config beat -l info"
    volumes:
      - ../../:/app
    env_file:
      - ./.env
    depends_on:
      - fatum-redis
      - fatum-database
    networks:
      - fatum-net

networks:
  fatum-net:
    driver: bridge

